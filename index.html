  <body>
    <header>
      <site-header data-text="VOLK" data-span="."></site-header>
    </header>
    <main>
      <site-hero
        id="hero"
        data-headline="Não perca <span>TEMPO & DINHEIRO</span>: Automatize sua operação com Tecnologia!"
        data-subheadline="Na Agência Volk, criamos automações inteligentes que trabalham para você: estratégia clara, operação otimizada e resultados reais — sem mistério, sem esqueminhas e sem promessas vazias."
        data-cta-label="Quero conhecer &rarr;"
        data-image="../assets/img/consultorluizg.webp"
      >
      </site-hero>
      <site-imgbox
        id="pain"
        data-subheadline="Muitos empresários vivem dizendo: <span>'não consigo vender'</span>"
        data-text="<p>Você já sentiu que seu e-commerce não vende? Ou pior: que você gasta dinheiro em anúncios e o retorno simplesmente não aparece no caixa?</p>
        <p>Outros nem sabem de onde o cliente vem — o que torna impossível prever vendas e crescer com segurança.</p>
        <p>A verdade é simples: <b>não existe milagre, mas existe estratégia.</b> E sem ela, você continua perdendo tempo e dinheiro todos os dias.</p>"
        data-image="../assets/img/equipe.webp"
      >
      </site-imgbox>
      <site-imgbox
        id="solve"
        data-subheadline="Você <span>faturar alto</span> e vender muito é nossa missão!"
        data-text="<ul>
            <li>
              <h3>NÃO EXISTE MILAGRE</h3>
              <p>O que realmente faz diferença é ter clareza: vamos entender para quem você quer vender, definir o melhor lugar para anunciar e como investir sem desperdiçar seu dinheiro.</p>
            </li>
            <li>
              <h3>NADA DE FÓRMULAS GENÉRICAS</h3>
              <p>O que nos move é o simples: olhar para o que torna seu negócio único e usar isso como base. Essa é a diferença entre anunciar por anunciar e ter campanhas que geram resultados tangíveis.</p>
            </li>
            <li>
              <h3>ESTRATÉGIA APLICADA</h3>
              <p>Usamos métodos validados para transformar perfis em vitrines que atraem fãs para sua marca. Criamos campanhas pagas personalizadas que serão motores de vendas imparáveis.</p>
            </li>
          </ul>
        "
        data-cta-label="Falar com Especialista"
        data-image="../assets/img/parceria.webp"
      >
      </site-imgbox>
      <site-cards
        id="benefits"
        data-subheadline="3 BENEFÍCIOS PRINCIPAIS"
        data-card1-title="RESULTADO PREVISÍVEL"
        data-card1-text="Campanhas criadas de forma estratégica para gerar clientes diariamente — sem achismos."
        data-card2-title="MENOS TRABALHO, MAIS VENDAS"
        data-card2-text="Seu atendimento automático com IA responde leads 24h, qualifica e encaminha vendas sem você precisar estar no celular."
        data-card3-title="INVESTIMENTO QUE RETORNA"
        data-card3-text="Estratégias personalizadas reduzem o custo por cliente e aumentam seu faturamento real."
        data-cta-label="Quero esses benefícios &rarr;"
      ></site-cards>
      <site-slide
        id="testmonials"
        data-testimonials='[
            {
              "quote": "Gostei muito da sua ajuda e conhecimento. Com essa parceria acredito que vou captar mais clientes e fortalecer a marca da empresa!",
              "name": "Ricardo Amaral",
              "work": "Proprietário",
              "business": "Amaral Climatização",
              "img": "../assets/img/depo1.webp"
            },
            {
              "quote": "Sobre a consultoria, achei jóia. Você tira dúvidas, dá ideias. Muito boa. Gostei! Me sinto mais segura para investir em anúncios agora.",
              "name": "Ana Barbel",
              "work": "Arquiteta",
              "business": "Escritório Arq. Barbel",
              "img": "../assets/img/depo2.webp"
            },
            {
              "quote": "Agora os clientes encontram a padaria no Google. Uma cliente até perguntou se atendia porque viu no Google. O movimento aumentou consideravelmente.",
              "name": "Fernanda Martins",
              "work": "Proprietária",
              "business": "Panificadora Central",
              "img": "../assets/img/depo3.webp"
            }
        ]'
        data-headline="O QUE NOSSOS CLIENTES DIZEM"
        data-subheadline="Histórias reais de quem confiou na Agência Volk."
      >
      </site-slide>
      <site-cards
        id="cases"
        data-subheadline="CASES DE SUCESSO"
        data-card1-title="&uarr; 750% de Crescimento"
        data-card1-text="De R$ 39k para R$ 300k mensais: escala de 750% em 6 meses com ROI ultra-eficiente."
        data-card2-title="&darr; 83% de Redução"
        data-card2-text="Redução drástica no custo por conversão (CPA) em 90 dias."
        data-card3-title="6 Dígitos em 30 dias"
        data-card3-text="Faturamento de R$ 1.1M em 6 meses com um ROAS impressionante de 79.7x."
      ></site-cards>
      <site-cta
        id="finalCTA"
        data-headline="PRONTO PARA COMEÇAR A <span>VENDER PRA VALER?</span>"
        data-subheadline="Enquanto você se decide, seus concorrentes já estão anunciando — e vendendo muito."
        data-cta-label="Agendar minha consultoria"
      >
      </site-cta>
    </main>
    <footer>
      <site-footer
        data-text="AGÊNCIA"
        data-span="VOLK"
        data-desc="Consultoria de Marketing Digital e Inovação em Ads Tech focada em resultados e otimização de recursos."
        data-cnpj="35.567.389/0001-45"
        data-contact-name="Luiz Gustavo"
        data-contact-phone="47991038285"
        data-contact-email="luiz@consultorluizg.com.br"
        data-contact-instagram="consultorluizg"
        data-contact-facebook="consultorluizg"
      >
      </site-footer>
    </footer>

    <div id="leadmodal-container"></div>
  </body>
